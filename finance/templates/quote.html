{% extends "layout.html" %}

{% block main %}

    {% if quote %}
    <p>A share of {{ quote["name"] }} ({{ quote["symbol"] }}) costs ${{quote["price"]}} </p>

    {% else %}
        <form action="/quote" method="post">
            <div class="mb-3">
                <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="symbol" placeholder="Symbol" type="text">
                <button class="btn btn-primary" type="submit" style="margin-top: 15px">Quote</button>
            </div>
        </form>
    {% endif %}
{% endblock %}

{% extends "layout.html" %}

{% block main %}

    {% if receipt %}
        <p>{{ receipt }}</p>

    {% else %}
        <form action="/sell" method="post">
            <div class="mb-3">
                <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="symbol" placeholder="Symbol" type="text">
                <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="quantity" placeholder="Quantity" type="text">
                <button class="btn btn-primary" type="submit" style="margin-top: 15px">Sell</button>
            </div>
        </form>
    {% endif %}
{% endblock %}

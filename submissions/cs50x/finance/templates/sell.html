{% extends "layout.html" %}

{% block main %}

        <form action="/sell" method="post">
            <div class="mb-3">
                <select class="form-control" id="symbol" name="symbol">
                    <option selected disabled value="None">Select a stock</option>
                    {% for stock in stocks %}
                        <option value="{{ stock.symbol }}">({{ stock.symbol }})</option>
                    {% endfor %}
                </select>
                <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="shares" placeholder="Quantity" type="text">
                <button class="btn btn-primary" type="submit" style="margin-top: 15px">Sell</button>
            </div>
        </form>

{% endblock %}

{% extends "encyclopedia/layout.html" %}

{% block title %}

    Create a page

{% endblock %}

{% block body %}

    <form action="{% url 'newpage' %}" method="POST">
        {% csrf_token %}
        <div style="padding-bottom: 1%;">
            <label for="newpage_title">Title:</label>
            <input type="text" name="newpage_title" value="{{ newpage_title }}">
        </div>
        {% if newpage_title %}<p style="color:red">This title already exists!</p>{% endif %}
        <textarea name="newpage_content" rows="4" cols="25">{{ newpage_content }}</textarea>
        <div><input type="submit" value="Save"></div>
    </form>

{% endblock %}

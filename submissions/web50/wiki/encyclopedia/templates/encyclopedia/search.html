{% extends "encyclopedia/layout.html" %}

{% block title %}

    Search Results

{% endblock %}

{% block body %}

    <h2>Search results:</h2>
    {% if suggestions %}
        <ul>
        {% for suggestion in suggestions %}
            <li><a href="/wiki/{{ suggestion }}">{{ suggestion }}</a></li>
        {% endfor %}
        </ul>
    {% else %}
        <ul><li>None</li></ul>
    {% endif %}

{% endblock %}

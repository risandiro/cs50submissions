<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <title>Trivia!</title>
        <script>

            // Wait for DOM content to load
            document.addEventListener('DOMContentLoaded', function() {

                // Create a variable for every element with class 'correct'
                let corrects = document.querySelectorAll('.correct');

                // Add click event listener to every class "correct" button
                for (let i = 0; i < corrects.length; i++) {
                    corrects[i].addEventListener('click', function() {

                        // When it happens, change the background to green
                        corrects[i].style.backgroundColor = 'Green';

                        // Go to partent element of correct button, find the first feedback, print
                        corrects[i].parentElement.querySelector('.feedback').innerHTML = 'Correct!';
                    });
                }

                let incorrects = document.querySelectorAll('.incorrect');

                for (let i = 0; i < incorrects.length; i++) {

                    incorrects[i].addEventListener('click', function() {

                        incorrects[i].style.backgroundColor = 'Red';

                        incorrects[i].parentElement.querySelector('.feedback').innerHTML = 'Incorrect!';
                    });
                }

                document.querySelector('#check').addEventListener('click', function() {
                    let input = document.querySelector('input');
                    if (input.value == '1969') {
                        input.style.background = 'green';
                        input.parentElement.querySelector('.feedback'.innerHTML = 'Correct!';)
                    }
                    else {
                        input.style.background = 'red';
                        input.parentElement.querySelector('.feedback'.innerHTML = 'Incorrect!';)
                    }
                });
            });

        </script>
    </head>
    <body>
        <div class="header">
            <h1>Trivia!</h1>
        </div>

        <div class="container">
            <div class="section">
                <h2>Part 1: Multiple Choice </h2>
                <hr>
                <h3>How many colors are there in a rainbow?</h3>
                <button class="incorrect">Six</button>
                <button class="correct">Seven</button>
                <button class="incorrect">Eight</button>
                <button class="incorrect">Nine</button>
                <button class="incorrect">Ten</button>
                <p class="feedback"></p>
            </div>

            <div class="section">
                <h2>Part 2: Free Response</h2>
                <hr>
                <h3>What year was the Moon landing?</h3>
                <input type="text"></button>
                <button id="check">Check Answer</button>
                <p class="feedback"></p>
            </div>
        </div>
    </body>
</html>
